[package]
name = "p2panda-auth"
version = "0.5.2"
edition = "2024"
authors = [
  "adz <x12@adz.garden>",
  "sandreae <contact@samandreae.com>",
  "glyph <glyph@mycelial.technology>",
]
description = "Decentralised group management with fine-grained, per-member permissions"
repository = "https://github.com/p2panda/p2panda"
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = ["auth", "access-control", "groups", "crdt", "offline-first"]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["processor"]
processor = [
  "serde",
  "dep:p2panda-core",
  "dep:p2panda-stream",
  "dep:p2panda-store",
  "dep:tokio",
]
test_utils = [
  "serde",
  "dep:p2panda-core",
  "dep:rand",
  "dep:tokio",
  "dep:tracing-subscriber",
]
serde = ["dep:serde"]
test = ["test_utils"]

[dependencies]
p2panda-core = { path = "../p2panda-core", version = "0.5.2", optional = true }
p2panda-store = { path = "../p2panda-store", version = "0.5.2", optional = true }
p2panda-stream = { path = "../p2panda-stream", version = "0.5.2", optional = true }
petgraph = { version = "0.8.3", features = ["serde-1"] }
rand = { version = "0.10.0", optional = true }
serde = { version = "1.0.219", features = ["derive"], optional = true }
thiserror = "2.0.12"
tokio = { version = "1.49.0", features = ["sync", "signal"], optional = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = [
  "env-filter",
], optional = true }

[dev-dependencies]
anyhow = "1.0.102"
ciborium = "0.2.2"
futures-util = "0.3.32"
p2panda-auth = { path = ".", features = ["test_utils"] }
p2panda-core = { path = "../p2panda-core", version = "0.5.2", features = [
  "test_utils",
] }
p2panda-net = { path = "../p2panda-net", version = "0.5.2" }
p2panda-store = { path = "../p2panda-store", version = "0.5.2", features = [
  "test_utils",
] }
p2panda-sync = { path = "../p2panda-sync", version = "0.5.2" }

[lints]
workspace = true
