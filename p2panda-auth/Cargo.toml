[package]
name = "p2panda-auth"
version = "0.5.2"
edition = "2024"
authors = [
  "adz <x12@adz.garden>",
  "sandreae <contact@samandreae.com>",
  "glyph <glyph@mycelial.technology>",
]
description = "Decentralised group management with fine-grained, per-member permissions"
repository = "https://github.com/p2panda/p2panda"
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = ["auth", "access-control", "groups", "crdt", "offline-first"]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["processor"]
processor = [
  "dep:p2panda-core",
  "dep:p2panda-stream",
  "dep:p2panda-store",
  "dep:tokio",
  "serde",
]
test_utils = [
  "dep:p2panda-core",
  "dep:rand",
  "dep:tokio",
  "dep:tracing-subscriber",
  "serde",
]
serde = ["dep:serde"]
test = ["test_utils"]

[dependencies]
p2panda-core = { workspace = true, optional = true }
p2panda-store = { workspace = true, optional = true }
p2panda-stream = { workspace = true, optional = true }
petgraph = { version = "0.8.3", features = ["serde-1"] }
rand = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "signal"], optional = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"], optional = true }

[dev-dependencies]
anyhow = "1.0.102"
ciborium = { workspace = true }
futures-util = { workspace = true }
p2panda-auth = { workspace = true, features = ["test_utils"] }
p2panda-core = { workspace = true, features = ["test_utils"] }
p2panda-net = { workspace = true }
p2panda-store = { workspace = true, features = ["test_utils"] }
p2panda-sync = { workspace = true }

[lints]
workspace = true
