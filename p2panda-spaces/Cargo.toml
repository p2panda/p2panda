[package]
name = "p2panda-spaces"
version = "0.6.1"
edition = "2024"
authors = [
  "adz <x12@adz.garden>",
  "sandreae <contact@samandreae.com>",
  "glyph <glyph@mycelial.technology>",
]
repository = "https://github.com/p2panda/p2panda"
license = "MIT OR Apache-2.0"
readme = "README.md"
rust-version = "1.96"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
test_utils = [
  "p2panda-auth/test_utils",
  "p2panda-encryption/test_utils",
  "p2panda-store/macros",
  "p2panda-store/test_utils",
]

[dependencies]
p2panda-auth = { workspace = true, default-features = false, features = ["serde"] }
p2panda-core = { workspace = true, default-features = false }
p2panda-encryption = { workspace = true, default-features = false, features = ["data_scheme"] }
p2panda-store = { workspace = true, features = ["sqlite", "spaces"] }
petgraph = "0.8.2"
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }

[dev-dependencies]
p2panda-spaces = { path = ".", features = ["test_utils"] }
tokio = { workspace = true, features = ["rt", "macros"] }
