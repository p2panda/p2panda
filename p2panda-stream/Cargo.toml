[package]
name = "p2panda-stream"
version = "0.5.2"
edition = "2024"
authors = [
  "adz <x12@adz.garden>",
  "sandreae <contact@samandreae.com>",
  "glyph <glyph@mycelial.technology>",
]
description = "Event stream processing for p2p data-types"
repository = "https://github.com/p2panda/p2panda"
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = ["eventsourcing", "processing", "p2p", "local-first", "stream"]

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true

[features]
default = [
  "ingest",
  "log_prune",
  "orderer",
]
ingest = [
  "dep:p2panda-core",
]
log_prune = [
  "p2panda-core/prune",
]
orderer = [
  "dep:p2panda-core",
  "dep:p2panda-store",
  "dep:thiserror",
]

[dependencies]
futures-core = { version = "0.3.31", default-features = false, features = ["alloc"] }
p2panda-core = { workspace = true, optional = true }
p2panda-store = { workspace = true, optional = true }
pin-project = "1.1.10"
thiserror = { version = "2.0.16", optional = true }
tokio = { workspace = true, features = ["rt", "sync", "macros"] }

[dev-dependencies]
futures-test = { version = "0.3.31" }
futures-util = { workspace = true, features = ["alloc"] }
p2panda-core = { workspace = true, features = ["test_utils"] }
p2panda-store = { workspace = true, features = ["test_utils"] }
serde = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
tokio-stream = { workspace = true }
